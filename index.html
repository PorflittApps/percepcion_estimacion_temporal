<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percepción y Estimación Temporal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page" id="app">
    <section class="hero-screen" aria-labelledby="main-title">
      <header class="institutional-header">
        <div class="logo-card logo-card-uc">
          <img src="logo_uc.svg" alt="Pontificia Universidad Católica de Chile" class="logo-uc" />
        </div>
        <div class="separator" aria-hidden="true"></div>
        <div class="logo-card logo-card-cedeti">
          <img src="logo_cedeti.png" alt="Centro UC Desarrollo de Tecnologías de Inclusión - CEDETi" class="logo-cedeti" />
        </div>
      </header>

      <section class="hero-content">
        <p class="eyebrow">Estudio académico</p>
        <h1 id="main-title">Percepción y Estimación Temporal</h1>
        <p class="subtitle">
          Aplicación web orientada a medir variables temporales mediante estímulos viso-auditivos.
        </p>

        <div class="action-panel">
          <button class="primary-button" id="startButton" type="button">
            Comenzar
            <span aria-hidden="true">→</span>
          </button>
          <button class="secondary-button" id="infoButton" type="button">
            Ver información del estudio
          </button>
        </div>
      </section>

      <footer class="footer-note">
        <p>
          Pontificia Universidad Católica de Chile · Centro de Desarrollo de Tecnologías de Inclusión — CEDETi UC
        </p>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
