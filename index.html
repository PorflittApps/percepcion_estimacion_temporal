<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percepción y Estimación Temporal</title>
  <meta name="description" content="Aplicación web orientada a medir variables temporales mediante estímulos viso-auditivos, con fines de investigación académica." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <header class="institutional-header" aria-label="Instituciones responsables">
      <div class="logo-wrap logo-wrap-uc">
        <img src="logo_uc.svg" alt="Pontificia Universidad Católica de Chile" class="logo logo-uc" />
      </div>

      <div class="logo-wrap logo-wrap-cedeti">
        <img src="logo_cedeti.png" alt="Centro UC Desarrollo de Tecnologías de Inclusión - CEDETi" class="logo logo-cedeti" />

    <section class="hero" aria-labelledby="main-title">
      <h1 id="main-title">Percepción y Estimación Temporal</h1>

  <script src="app.js"></script>
