<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percepción y Estimación Temporal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="institutional-header" aria-label="Instituciones responsables">
      <div class="logo-card logo-card-uc">
        <img src="logo_uc.svg" alt="Pontificia Universidad Católica de Chile" />
      </div>
      <div class="separator" aria-hidden="true"></div>
      <div class="logo-card logo-card-cedeti">
        <img src="logo_cedeti.png" alt="Centro UC Desarrollo de Tecnologías de Inclusión - CEDETi" />
      </div>
    </section>

    <section class="hero" aria-labelledby="titulo-principal">
      <div class="hero-card">
        <h1 id="titulo-principal">Percepción y Estimación Temporal</h1>
        <p class="subtitle">
          Aplicación web orientada a medir variables temporales mediante estímulos viso-auditivos,
          con fines de investigación académica.
        </p>
        <button id="startButton" class="primary-button" type="button">
          Iniciar
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
