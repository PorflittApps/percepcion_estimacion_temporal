m;display:flex;justify-content:center}.test-wrap{width:min(1050px,96vw)}.test-top{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.3rem}.test-title{margin:0;font-family:Georgia,'Times New Roman',serif;color:var(--navy);font-size:clamp(2rem,4vw,3.2rem)}.progress-text{color:#4b5563;font-weight:700}.progressbar{height:8px;background:#e9eef6;border-radius:999px;overflow:hidden;margin:0 0 1.5rem}.progressbar span{display:block;height:100%;background:var(--blue);width:0%;transition:width .35s ease}.test-card{border:1px solid var(--line);border-radius:20px;padding:2rem;background:#fff;box-shadow:0 10px 30px rgba(15,35,87,.06)}.test-card h2{margin:0 0 .75rem;color:var(--navy);font-size:clamp(1.45rem,2.4vw,2rem)}.instruction{font-size:1.18rem;line-height:1.55;color:#26364a;margin:.5rem 0 1.4rem}.trial-meta{color:#64748b;font-weight:700;margin-bottom:1rem}.big-action{min-height:96px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin:1.5rem 0}.round-btn{width:124px;height:124px;border-radius:999px;border:0;background:var(--red);color:#fff;font-weight:800;font-size:1.05rem;box-shadow:0 12px 26px rgba(200,30,44,.22);cursor:pointer}.round-btn:disabled{background:#a9b2c0;box-shadow:none;cursor:not-allowed}.arrival-area{position:relative;height:270px;border:1px solid #e1e7f0;border-radius:18px;background:#fbfcfe;margin:1.4rem 0;overflow:hidden}.track{position:absolute;left:9%;right:17%;top:50%;height:3px;background:#cbd5e1}.ball{position:absolute;top:calc(50% - 22px);left:9%;width:44px;height:44px;border-radius:999px;background:#e3343f;box-shadow:0 12px 26px rgba(227,52,63,.25);transition:left .05s linear}.finish{position:absolute;right:6%;top:calc(50% - 82px);width:76px;height:150px}.finish .pole{position:absolute;left:8px;top:0;width:6px;height:150px;background:#374151;border-radius:4px}.finish .flag{position:absolute;left:14px;top:4px;width:62px;height:38px;background:linear-gradient(135deg,#0f2357,#2f4ea2);color:#fff;border-radius:4px 12px 12px 4px;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;letter-spacing:.04em;box-shadow:0 8px 18px rgba(15,35,87,.15)}.finish .base{position:absolute;left:0;bottom:0;width:34px;height:7px;background:#374151;border-radius:999px}.response-panel{display:none;margin-top:1rem;border-top:1px solid #e5eaf2;padding-top:1.25rem}.response-panel.show{display:block}.response-panel input[type=number]{font-size:1.2rem;padding:.8rem 1rem;border:1px solid #cbd5e1;border-radius:12px;width:180px;margin-right:.8rem}.option-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:1rem}.muted{color:#64748b}.final-hero{border:1px solid #dbe3ef;background:linear-gradient(180deg,#f8fbff,#fff);border-radius:22px;padding:2rem;text-align:center}.final-hero h2{font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,4vw,3.3rem);margin:.3rem 0;color:var(--navy)}.final-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;margin:1.5rem 0}.metric{border:1px solid #e1e7f0;border-radius:16px;padding:1.2rem;background:#fff}.metric span{display:block;color:#667085;font-size:.95rem}.metric strong{display:block;color:var(--navy);font-size:1.7rem;margin-top:.3rem}.downloads{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.6rem}.save-state{font-weight:700;color:#64748b;text-align:center;margin-top:1rem}@media(max-width:860px){.demo-row,.long-row,.long-select{grid-template-columns:1fr;gap:.4rem}.choice-line{gap:1.1rem}.test-top{flex-direction:column;align-items:flex-start}.final-grid{grid-template-columns:1fr}.finish{right:2%;transform:scale(.85)}.ball{width:38px;height:38px;top:calc(50% - 19px)}.logo-uc-only{width:min(760px,88vw)}}

const TEST_PLAN=[{block:"Estimación temporal",item:1,kind:"marks",title:"Ítem 1: estimación de intervalos",instruction:"Presione iniciar. Luego marque cuando crea que han pasado 5, 10 y 20 segundos.",targets:[5,10,20],trials:[{trial:1,condition:"silencio",audio:"audios/estimacion_item1/EST_Item1_Trial1_silencio.wav"},{trial:2,condition:"pulso constante",audio:"audios/estimacion_item1/EST_Item1_Trial2_pulso_constante.wav"},{trial:3,condition:"acelerando",audio:"audios/estimacion_item1/EST_Item1_Trial3_acelerando.wav"},{trial:4,condition:"desacelerando",audio:"audios/estimacion_item1/EST_Item1_Trial4_desacelerando.wav"}]},{block:"Estimación temporal",item:2,kind:"ball",title:"Ítem 2: llegada imaginada a la meta",instruction:"Observe la pelota roja. Cuando desaparezca, continúe mentalmente su movimiento y presione el botón cuando crea que llegó a la meta.",trials:[{trial:1,condition:"silencio",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial1_silencio_largo.wav",targetTime:18,disappear:7,audioDuration:34},{trial:2,condition:"pulso constante",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial2_pulso_constante_largo.wav",targetTime:20,disappear:10,audioDuration:34},{trial:3,condition:"acelerando",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial3_acelerando_largo.wav",targetTime:16,disappear:5,audioDuration:34},{trial:4,condition:"desacelerando",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial4_desacelerando_largo.wav",targetTime:22,disappear:12,audioDuration:34},{trial:5,condition:"pulso irregular",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial5_pulso_irregular_largo.wav",targetTime:18.5,disappear:8,audioDuration:34},{trial:6,condition:"pulso lento",audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial6_pulso_lento_largo.wav",targetTime:22,disappear:12,audioDuration:34}]},{block:"Percepción temporal",item:3,kind:"pulseChange",title:"Ítem 3: cambio de pulso",instruction:"Escuchará un estímulo breve con un pulso. Al terminar, indique si cree que el pulso se aceleró, se mantuvo igual o se desaceleró.",trials:[{trial:1,condition:"se acelera poco",difficulty:"difícil",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial1_acelera_poco_dificil.wav",bpmStart:92,bpmEnd:100,correct:"Se aceleró"},{trial:2,condition:"se mantiene igual",difficulty:"fácil",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial2_igual_facil.wav",bpmStart:96,bpmEnd:96,correct:"Se mantuvo igual"},{trial:3,condition:"se acelera bastante",difficulty:"fácil",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial3_acelera_bastante_facil.wav",bpmStart:84,bpmEnd:112,correct:"Se aceleró"},{trial:4,condition:"se desacelera bastante",difficulty:"fácil",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial4_desacelera_bastante_facil.wav",bpmStart:112,bpmEnd:84,correct:"Se desaceleró"},{trial:5,condition:"se mantiene igual a pulso muy lento",difficulty:"mediano",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial5_igual_lento_mediano.wav",bpmStart:56,bpmEnd:56,correct:"Se mantuvo igual"},{trial:6,condition:"se desacelera muy lento",difficulty:"difícil",audio:"audios/percepcion_item3_cambio_pulso/PER_Item3_CambioPulso_Trial6_desacelera_lento_dificil.wav",bpmStart:60,bpmEnd:52,correct:"Se desaceleró"}]},{block:"Percepción temporal",item:4,kind:"duration",title:"Ítem 4: intervalo entre dos bips",instruction:"Escuche el estímulo completo. Al terminar, indique cuántos segundos cree que pasaron entre el primer y el segundo bip.",responseLabel:"Segundos entre bips",trials:[{trial:1,condition:"silencio",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial1_silencio.wav",duration:5},{trial:2,condition:"pulso constante",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial2_pulso_constante.wav",duration:8},{trial:3,condition:"acelerando",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial3_acelerando.wav",duration:11},{trial:4,condition:"desacelerando",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial4_desacelerando.wav",duration:13},{trial:5,condition:"pulso irregular",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial5_pulso_irregular.wav",duration:16.5},{trial:6,condition:"pulso constante medio",audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial6_pulso_constante_medio.wav",duration:9.3}]},{block:"Percepción temporal",item:5,kind:"compare",title:"Ítem 5: comparación de duraciones",instruction:"Escuche los estímulos A y B. Al terminar, indique cuál cree que duró más.",trials:[{trial:1,condition:"B mayor",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial1_facil_B_mayor.wav",durA:8,durB:10,correct:"B"},{trial:2,condition:"A mayor",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial2_facil_A_mayor.wav",durA:12,durB:9,correct:"A"},{trial:3,condition:"igual",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial3_igual.wav",durA:7,durB:7,correct:"Igual"},{trial:4,condition:"A mayor",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial4_medio_A_mayor.wav",durA:14,durB:11,correct:"A"},{trial:5,condition:"B mayor",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial5_medio_B_mayor.wav",durA:6,durB:8.5,correct:"B"},{trial:6,condition:"A mayor difícil",audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial6_dificil_A_mayor.wav",durA:10.5,durB:10,correct:"A"}]},{block:"Percepción temporal",item:6,kind:"global",title:"Ítem 6: duración total del test",instruction:"¿Cuánto tiempo cree que pasó desde el inicio del primer ítem hasta este momento?"}];
let flat=[];TEST_PLAN.forEach(s=>{if(s.trials)s.trials.forEach(t=>flat.push({section:s,trial:t}));else flat.push({section:s,trial:null})});let index=-1,currentAudio=null,trialStart=0,testStart=0,results=[],finalRow=null;const card=document.getElementById("test-card"),bar=document.getElementById("progressbar"),progressText=document.getElementById("progress-text");document.addEventListener("DOMContentLoaded",renderIntro);function renderIntro(){card.innerHTML=`<h2>Antes de comenzar</h2><p class="instruction">Busque un lugar tranquilo. Use audífonos si lo desea. Durante la prueba, evite distraerse con el teléfono u otros estímulos visuales, táctiles o auditivos.</p><div class="big-action"><button class="btn primary" onclick="startTest()">Comenzar test</button></div>`}function startTest(){testStart=performance.now();index=0;renderStep()}function updateProgress(){const pct=Math.max(0,Math.min(100,(index/flat.length)*100));bar.style.width=pct+"%";progressText.textContent=`Ítem ${Math.min(index+1,flat.length)} de ${flat.length}`}function renderStep(){stopAudio();if(index>=flat.length)return renderFinal();updateProgress();const {section,trial}=flat[index];const meta=trial?`<div class="trial-meta">${section.block} · ${section.title} · Trial ${trial.trial}</div>`:`<div class="trial-meta">${section.block} · ${section.title}</div>`;if(section.kind==="marks")return renderMarks(section,trial,meta);if(section.kind==="ball")return renderBall(section,trial,meta);if(section.kind==="pulseChange")return renderPulseChange(section,trial,meta);if(section.kind==="duration")return renderDuration(section,trial,meta);if(section.kind==="compare")return renderCompare(section,trial,meta);if(section.kind==="global")return renderGlobal(section,meta)}function makeAudio(src){const a=new Audio(src);a.preload="auto";currentAudio=a;return a}function stopAudio(){if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;currentAudio=null}}function next(){index++;renderStep()}
function renderMarks(section,trial,meta){let marks=[],targetIndex=0;card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="big-action"><button id="mark-btn" class="round-btn">Iniciar</button></div><p class="muted" id="hint">Primero presione iniciar. Luego marque 5, 10 y 20 segundos.</p>`;const btn=document.getElementById("mark-btn");btn.onclick=async()=>{if(targetIndex===0&&marks.length===0){trialStart=performance.now();const audio=makeAudio(trial.audio);try{await audio.play()}catch(e){alert("No se pudo reproducir el audio.")}marks.push({label:"inicio",elapsed:0});btn.textContent="5 s";document.getElementById("hint").textContent="Marque cuando crea que pasaron 5 segundos.";return}const elapsed=(performance.now()-trialStart)/1000,target=section.targets[targetIndex];marks.push({label:`${target}s`,target,elapsed,error:target-elapsed});targetIndex++;if(targetIndex<section.targets.length){btn.textContent=section.targets[targetIndex]+" s";document.getElementById("hint").textContent=`Marque cuando crea que pasaron ${section.targets[targetIndex]} segundos.`}else{stopAudio();btn.disabled=true;document.getElementById("hint").textContent="Respuesta registrada.";results.push({kind:"marks",block:section.block,item:section.item,trial:trial.trial,condition:trial.condition,marks});setTimeout(next,700)}}}
function renderBall(section,trial,meta){card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="arrival-area"><div class="track"></div><div class="ball" id="ball"></div><div class="finish"><div class="pole"></div><div class="flag">META</div><div class="base"></div></div></div><div class="big-action"><button id="ball-main" class="btn primary">Iniciar trial</button></div><p class="muted" id="ball-hint">Presione iniciar para comenzar.</p>`;const main=document.getElementById("ball-main"),ball=document.getElementById("ball");let started=false,raf=null,hidden=false,audioEnded=false;main.onclick=async()=>{if(!started){started=true;main.textContent="Marcar llegada";trialStart=performance.now();const audio=makeAudio(trial.audio);audio.onended=()=>{audioEnded=true;document.getElementById("ball-hint").textContent="El sonido terminó. Si aún no respondió, marque cuando crea que la pelota llegó a la meta."};try{await audio.play()}catch(e){alert("No se pudo reproducir el audio.")}document.getElementById("ball-hint").textContent="Cuando la pelota desaparezca, imagine su movimiento y presione cuando llegue a la meta.";const animate=()=>{const elapsed=(performance.now()-trialStart)/1000;const pct=Math.min(1,elapsed/trial.targetTime);if(!hidden)ball.style.left=`calc(9% + ${pct} * 73%)`;if(!hidden&&elapsed>=trial.disappear){hidden=true;ball.style.display="none"}if(started)raf=requestAnimationFrame(animate)};raf=requestAnimationFrame(animate);return}const response=(performance.now()-trialStart)/1000;stopAudio();if(raf)cancelAnimationFrame(raf);main.disabled=true;results.push({kind:"ball",block:section.block,item:section.item,trial:trial.trial,condition:trial.condition,targetTime:trial.targetTime,disappear:trial.disappear,audioDuration:trial.audioDuration,response,error:trial.targetTime-response,post_disappear:response-trial.disappear,audioEnded});document.getElementById("ball-hint").textContent="Respuesta registrada.";setTimeout(next,700)}}
function renderPulseChange(section,trial,meta){card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="big-action"><button id="play-btn" class="btn primary">Reproducir estímulo</button></div><div id="response-panel" class="response-panel"><div class="option-row"><button class="btn secondary" data-resp="Se desaceleró">Se desaceleró</button><button class="btn secondary" data-resp="Se mantuvo igual">Se mantuvo igual</button><button class="btn secondary" data-resp="Se aceleró">Se aceleró</button></div></div><p class="muted" id="pulse-hint">Presione reproducir y espere a que termine.</p>`;const play=document.getElementById("play-btn"),panel=document.getElementById("response-panel");play.onclick=async()=>{play.disabled=true;const audio=makeAudio(trial.audio);audio.onended=()=>{panel.classList.add("show");document.getElementById("pulse-hint").textContent="Seleccione su respuesta."};try{await audio.play()}catch(e){alert("No se pudo reproducir el audio.");play.disabled=false}};panel.querySelectorAll("button").forEach(btn=>{btn.onclick=()=>{const response=btn.dataset.resp;results.push({kind:"pulseChange",block:section.block,item:section.item,trial:trial.trial,condition:trial.condition,difficulty:trial.difficulty,bpmStart:trial.bpmStart,bpmEnd:trial.bpmEnd,bpmDiff:trial.bpmEnd-trial.bpmStart,response,correct:trial.correct,score:response===trial.correct?1:0});next()}})}
function renderDuration(section,trial,meta){card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="big-action"><button id="play-btn" class="btn primary">Reproducir estímulo</button></div><div id="response-panel" class="response-panel"><label>${section.responseLabel||"Duración estimada en segundos"}: <input type="number" id="num-response" min="0" step="0.1"></label><button class="btn primary" id="save-response">Guardar</button></div><p class="muted" id="dur-hint">Presione reproducir y espere a que termine el estímulo.</p>`;const play=document.getElementById("play-btn"),panel=document.getElementById("response-panel");play.onclick=async()=>{play.disabled=true;const audio=makeAudio(trial.audio);audio.onended=()=>{panel.classList.add("show");document.getElementById("dur-hint").textContent="Ingrese su respuesta."};try{await audio.play()}catch(e){alert("No se pudo reproducir el audio.");play.disabled=false}};document.getElementById("save-response").onclick=()=>{const val=parseFloat(document.getElementById("num-response").value);if(Number.isNaN(val)){alert("Ingrese una respuesta numérica.");return}results.push({kind:"duration",block:section.block,item:section.item,trial:trial.trial,condition:trial.condition,target:trial.duration,response:val,error:trial.duration-val});next()}}
function renderCompare(section,trial,meta){card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="big-action"><button id="play-btn" class="btn primary">Reproducir A y B</button></div><div id="response-panel" class="response-panel"><div class="option-row"><button class="btn secondary" data-resp="A">A duró más</button><button class="btn secondary" data-resp="B">B duró más</button><button class="btn secondary" data-resp="Igual">Duraron igual</button></div></div><p class="muted" id="cmp-hint">Presione reproducir y espere a que termine.</p>`;const play=document.getElementById("play-btn"),panel=document.getElementById("response-panel");play.onclick=async()=>{play.disabled=true;const audio=makeAudio(trial.audio);audio.onended=()=>{panel.classList.add("show");document.getElementById("cmp-hint").textContent="Seleccione su respuesta."};try{await audio.play()}catch(e){alert("No se pudo reproducir el audio.");play.disabled=false}};panel.querySelectorAll("button").forEach(btn=>{btn.onclick=()=>{const response=btn.dataset.resp;results.push({kind:"compare",block:section.block,item:section.item,trial:trial.trial,condition:trial.condition,durA:trial.durA,durB:trial.durB,response,correct:trial.correct,score:response===trial.correct?1:0});next()}})}
function renderGlobal(section,meta){const elapsed=(performance.now()-testStart)/1000;card.innerHTML=`${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p><div class="response-panel show"><label>Minutos: <input type="number" id="min-response" min="0" step="1"></label><label>Segundos: <input type="number" id="sec-response" min="0" max="59" step="1"></label><button class="btn primary" id="save-global">Guardar</button></div>`;document.getElementById("save-global").onclick=()=>{const m=parseFloat(document.getElementById("min-response").value||"0"),s=parseFloat(document.getElementById("sec-response").value||"0");if(Number.isNaN(m)||Number.isNaN(s)){alert("Ingrese minutos y segundos.");return}const response=m*60+s;results.push({kind:"global",block:section.block,item:section.item,real:elapsed,response,error:elapsed-response});index++;renderFinal()}}
function renderFinal(){stopAudio();const total=(performance.now()-testStart)/1000;finalRow=buildRow(total);localStorage.setItem("resultados_percepcion_temporal",JSON.stringify({demographics:getDemo(),results,total,row:finalRow}));const nums=results.flatMap(r=>{if(r.kind==="marks")return r.marks.filter(m=>m.target).map(m=>Math.abs(m.error));if(["ball","duration","global"].includes(r.kind))return [Math.abs(r.error)];return[]});const avg=nums.length?nums.reduce((a,b)=>a+b,0)/nums.length:0;const scored=results.filter(r=>["compare","pulseChange"].includes(r.kind));const score=scored.length?scored.reduce((a,b)=>a+b.score,0)/scored.length:0;card.innerHTML=`<div class="final-hero"><h2>Gracias por participar</h2><p class="instruction">Sus respuestas fueron registradas en este navegador. Puede descargar un resumen personal en PDF.</p><div class="final-grid"><div class="metric"><span>Error absoluto promedio</span><strong>${avg.toFixed(2)} s</strong></div><div class="metric"><span>Respuestas perceptivas correctas</span><strong>${Math.round(score*100)}%</strong></div><div class="metric"><span>Duración real del test</span><strong>${formatTime(total)}</strong></div><div class="metric"><span>Mediciones registradas</span><strong>${results.length}</strong></div></div><p class="muted">Estos resultados son orientativos y no constituyen una evaluación diagnóstica.</p><div class="downloads"><button class="btn primary" onclick="downloadPDF()">Descargar resumen en PDF</button></div></div>`;bar.style.width="100%";progressText.textContent="Finalizado"}
function getDemo(){try{return JSON.parse(localStorage.getItem("demograficos_percepcion_temporal")||"{}")}catch(e){return{}}}function buildRow(total){const d=getDemo();const row={fecha:new Date().toISOString(),participant_id:d.participant_id||"",Edad:d.edad||"",Sexo:d.sexo||"",Pais:d.pais||"",Estudios:d.estudios||"",SegundoIdioma:d.segundo_idioma||"",Hablar:d.hablar||0,Escuchar:d.escuchar||0,Leer:d.leer||0,Escribir:d.escribir||0,Ent_sinMirar:d.ent_sin_mirar||"",hrsMus:d.hrs_mus||"",ConAnio:d.con_anio||"",AutoDef:d.autodef||"",duracion_real_test_segundos:round(total)};results.forEach(r=>{if(r.kind==="marks")r.marks.filter(m=>m.target).forEach(m=>{row[`EST_Item${r.item}_Trial${r.trial}_${m.target}s_respuesta`]=round(m.elapsed);row[`EST_Item${r.item}_Trial${r.trial}_${m.target}s_error`]=round(m.error)});if(r.kind==="ball"){row[`EST_Item${r.item}_Trial${r.trial}_tiempo_meta`]=r.targetTime;row[`EST_Item${r.item}_Trial${r.trial}_audio_duracion`]=r.audioDuration;row[`EST_Item${r.item}_Trial${r.trial}_bola_desaparece`]=r.disappear;row[`EST_Item${r.item}_Trial${r.trial}_respuesta_meta`]=round(r.response);row[`EST_Item${r.item}_Trial${r.trial}_error_meta`]=round(r.error)}if(r.kind==="pulseChange"){row[`PER_Item${r.item}_Trial${r.trial}_bpm_inicial`]=r.bpmStart;row[`PER_Item${r.item}_Trial${r.trial}_bpm_final`]=r.bpmEnd;row[`PER_Item${r.item}_Trial${r.trial}_diferencia_bpm`]=r.bpmDiff;row[`PER_Item${r.item}_Trial${r.trial}_dificultad`]=r.difficulty;row[`PER_Item${r.item}_Trial${r.trial}_condicion_correcta`]=r.correct;row[`PER_Item${r.item}_Trial${r.trial}_respuesta`]=r.response;row[`PER_Item${r.item}_Trial${r.trial}_puntaje`]=r.score}if(r.kind==="duration"){row[`PER_Item${r.item}_Trial${r.trial}_duracion_real`]=r.target;row[`PER_Item${r.item}_Trial${r.trial}_respuesta`]=round(r.response);row[`PER_Item${r.item}_Trial${r.trial}_error`]=round(r.error)}if(r.kind==="compare"){row[`PER_Item${r.item}_Trial${r.trial}_duracion_A`]=r.durA;row[`PER_Item${r.item}_Trial${r.trial}_duracion_B`]=r.durB;row[`PER_Item${r.item}_Trial${r.trial}_respuesta`]=r.response;row[`PER_Item${r.item}_Trial${r.trial}_correcta`]=r.correct;row[`PER_Item${r.item}_Trial${r.trial}_puntaje`]=r.score}if(r.kind==="global"){row[`PER_Item${r.item}_duracion_real_global_segundos`]=round(r.real);row[`PER_Item${r.item}_estimacion_global_segundos`]=round(r.response);row[`PER_Item${r.item}_error_global`]=round(r.error)}});return row}
function downloadPDF(){const d=getDemo();const row=finalRow||buildRow((performance.now()-testStart)/1000);const nums=results.flatMap(r=>{if(r.kind==="marks")return r.marks.filter(m=>m.target).map(m=>Math.abs(m.error));if(["ball","duration","global"].includes(r.kind))return [Math.abs(r.error)];return[]});const avg=nums.length?nums.reduce((a,b)=>a+b,0)/nums.length:0;const scored=results.filter(r=>["compare","pulseChange"].includes(r.kind));const score=scored.length?scored.reduce((a,b)=>a+b.score,0)/scored.length:0;if(window.jspdf&&window.jspdf.jsPDF){const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFillColor(15,35,87);doc.rect(0,0,210,34,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(17);doc.text("Percepción y Estimación Temporal",18,18);doc.setFontSize(10);doc.text("Resumen personal de participación",18,26);doc.setTextColor(31,45,61);doc.setFont("helvetica","normal");doc.setFontSize(10);doc.text("Fecha: "+new Date().toLocaleString(),18,46);doc.text("Código de participación: "+(d.participant_id||"sin identificador"),18,53);function box(x,y,w,h,title,value){doc.setDrawColor(215,222,233);doc.setFillColor(248,250,252);doc.roundedRect(x,y,w,h,4,4,"FD");doc.setTextColor(80,92,110);doc.setFontSize(9);doc.text(title,x+6,y+9);doc.setTextColor(15,35,87);doc.setFont("helvetica","bold");doc.setFontSize(18);doc.text(value,x+6,y+23);doc.setFont("helvetica","normal")}box(18,65,82,32,"Error absoluto promedio",avg.toFixed(2)+" s");box(110,65,82,32,"Percepción correcta",Math.round(score*100)+"%");box(18,105,82,32,"Duración real del test",formatTime(row.duracion_real_test_segundos||0));box(110,105,82,32,"Mediciones registradas",String(results.length));doc.setDrawColor(217,164,65);doc.line(18,151,192,151);doc.setTextColor(31,45,61);doc.setFontSize(11);const lines=doc.splitTextToSize("Estos resultados son orientativos y no constituyen una evaluación diagnóstica. El resumen busca entregar una devolución general y amigable de la participación.",174);doc.text(lines,18,163);doc.setTextColor(75,85,99);doc.setFontSize(10);doc.text("Gracias por participar.",18,190);doc.save("resumen_percepcion_temporal.pdf")}else{window.print()}}
function round(n){return Math.round(n*1000)/1000}function formatTime(sec){const m=Math.floor(sec/60),s=Math.round(sec%60);return `${m}:${String(s).padStart(2,"0")}`}
</script></body></html>
