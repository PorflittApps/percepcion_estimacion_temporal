<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Test</title><style>
:root{
  --navy:#0f2357;
  --blue:#2f4ea2;
  --text:#111827;
  --muted:#374151;
  --line:#d7dee9;
  --check:#155f7a;
  --soft:#f6f8fb;
  --ok:#0f766e;
  --warn:#b45309;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff;color:var(--text);font-family:Arial,Helvetica,sans-serif}
button,input,select{font-family:inherit}
.app{min-height:100vh;background:#fff}
.splash,.consent{
  min-height:100vh;width:100%;position:absolute;inset:0;background:#fff;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 2s ease;
}
.splash.active,.consent.active{opacity:1;pointer-events:auto}
.splash-logo{display:block;object-fit:contain;max-width:62vw;max-height:175px}
.logo-uc-only{max-height:175px}
.logo-cedeti-only{max-height:155px}
.logo-facultad-only{max-height:165px}
.consent{padding:3rem 1.5rem}
.consent-inner{width:min(980px,92vw);text-align:center}
.consent-inner h1{
  margin:0;color:var(--navy);font-family:Georgia,'Times New Roman',serif;
  font-weight:600;font-size:clamp(2.4rem,4.4vw,4.4rem);line-height:1.08
}
.subtitle{
  margin:1.1rem auto 0;max-width:880px;color:#273a69;
  font-size:clamp(1.1rem,1.8vw,1.55rem);line-height:1.45
}
.consent-card{
  margin:2.35rem auto 0;width:min(880px,100%);
  border:1px solid var(--line);border-radius:16px;padding:2rem 2.1rem 1.7rem;
}
.consent-card h2{margin:0 0 1rem;color:var(--navy);font-size:clamp(1.4rem,2.1vw,1.95rem)}
.consent-card p{
  margin:.55rem auto;max-width:760px;color:#26364a;
  font-size:clamp(1rem,1.35vw,1.15rem);line-height:1.55
}
.actions{margin-top:1.8rem;display:flex;justify-content:center;gap:1.1rem;flex-wrap:wrap}
.btn{
  min-width:220px;padding:1rem 1.45rem;border-radius:12px;text-decoration:none;
  font-size:1.05rem;font-weight:700;border:1px solid var(--navy);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;background:#fff;color:var(--navy)
}
.btn.primary{background:var(--navy);color:#fff}
.btn.secondary{background:#fff;color:var(--navy)}
.btn:hover{box-shadow:0 8px 20px rgba(15,35,87,.10);transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.demographics{
  min-height:100vh;background:#fff;padding:2.2rem 1.4rem 3rem;display:flex;justify-content:center
}
.demo-wrap{width:min(1180px,96vw)}
.demo-wrap h1{font-size:2rem;font-weight:500;margin:0 0 2.2rem;color:#111}
.demo-form{display:flex;flex-direction:column;gap:1.25rem}
.demo-row{
  display:grid;grid-template-columns:minmax(260px,420px) minmax(270px,530px);
  align-items:center;gap:1.6rem;min-height:52px
}
.demo-label,.demo-row legend{font-size:1.18rem;color:#111;line-height:1.35}
.demo-row select{
  border:0;background:#fff;color:#64748b;font-size:1.1rem;padding:.65rem .4rem;
  width:100%;max-width:530px
}
.demo-row select:focus{outline:2px solid rgba(47,78,162,.18);border-radius:8px}
fieldset.demo-row{border:0;padding:0;margin:0}
.choice-line{display:flex;gap:3.4rem;align-items:center;flex-wrap:wrap}
.choice-line.compact{gap:2.5rem}
.choice-line label{display:inline-flex;align-items:center;gap:.8rem;font-size:1.12rem;color:#111;cursor:pointer}
.choice-line input{
  appearance:none;width:32px;height:32px;background:var(--check);
  border:2px solid #0e2f42;border-radius:3px;position:relative;cursor:pointer
}
.choice-line input:checked::after{
  content:"✓";position:absolute;inset:-4px 0 0 0;color:#fff;text-align:center;
  line-height:32px;font-size:1.45rem;font-weight:900
}
.hidden-row{display:none!important}
.hidden-row.show{display:grid!important}
.long-row{grid-template-columns:minmax(520px,840px) auto}
.long-select{grid-template-columns:minmax(520px,840px) minmax(270px,530px)}
.note{font-weight:400}
.form-actions{margin-top:1.8rem;display:flex;justify-content:center}
.status{min-height:1.3rem;text-align:center;color:var(--blue);font-weight:700;margin-top:.8rem}
.center-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;padding:2rem
}
.card{
  width:min(760px,92vw);border:1px solid var(--line);border-radius:20px;text-align:center;
  padding:2.5rem 2rem
}
.card h1{font-family:Georgia,'Times New Roman',serif;color:var(--navy);font-size:3rem;margin:0 0 1rem}
.card p{color:#4b5563;font-size:1.1rem;line-height:1.6}
.test-page{min-height:100vh;background:#fff;padding:2rem 1.25rem;display:flex;justify-content:center}
.test-wrap{width:min(1050px,96vw)}
.test-top{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.3rem}
.test-title{margin:0;font-family:Georgia,'Times New Roman',serif;color:var(--navy);font-size:clamp(2rem,4vw,3.2rem)}
.progress-text{color:#4b5563;font-weight:700}
.progressbar{height:8px;background:#e9eef6;border-radius:999px;overflow:hidden;margin:0 0 1.5rem}
.progressbar span{display:block;height:100%;background:var(--blue);width:0%;transition:width .35s ease}
.test-card{border:1px solid var(--line);border-radius:20px;padding:2rem;background:#fff;box-shadow:0 10px 30px rgba(15,35,87,.06)}
.test-card h2{margin:0 0 .75rem;color:var(--navy);font-size:clamp(1.45rem,2.4vw,2rem)}
.instruction{font-size:1.18rem;line-height:1.55;color:#26364a;margin:.5rem 0 1.4rem}
.trial-meta{color:#64748b;font-weight:700;margin-bottom:1rem}
.big-action{min-height:96px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin:1.5rem 0}
.round-btn{width:120px;height:120px;border-radius:999px;border:0;background:#c81e2c;color:#fff;font-weight:800;font-size:1.2rem;box-shadow:0 12px 26px rgba(200,30,44,.22);cursor:pointer}
.round-btn:disabled{background:#a9b2c0;box-shadow:none;cursor:not-allowed}
.arrival-area{position:relative;height:230px;border:1px solid #e1e7f0;border-radius:18px;background:#fbfcfe;margin:1.4rem 0;overflow:hidden}
.track{position:absolute;left:9%;right:15%;top:50%;height:3px;background:#cbd5e1}
.ball{position:absolute;top:calc(50% - 22px);left:9%;width:44px;height:44px;border-radius:999px;background:#e3343f;box-shadow:0 12px 26px rgba(227,52,63,.25);transition:left .05s linear}
.targetT{position:absolute;right:8%;top:calc(50% - 58px);font-size:92px;font-weight:800;color:#333;line-height:1}
.response-panel{display:none;margin-top:1rem;border-top:1px solid #e5eaf2;padding-top:1.25rem}
.response-panel.show{display:block}
.response-panel input[type=number]{font-size:1.2rem;padding:.8rem 1rem;border:1px solid #cbd5e1;border-radius:12px;width:180px;margin-right:.8rem}
.option-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:1rem}
.muted{color:#64748b}
.final-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;margin:1.5rem 0}
.metric{border:1px solid #e1e7f0;border-radius:16px;padding:1.2rem;background:#fbfcfe}
.metric strong{display:block;color:var(--navy);font-size:1.6rem;margin-top:.3rem}
.downloads{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.6rem}
@media(max-width:860px){
  .demo-row,.long-row,.long-select{grid-template-columns:1fr;gap:.4rem}
  .choice-line{gap:1.1rem}
  .splash-logo{max-width:80vw}
  .test-top{flex-direction:column;align-items:flex-start}
  .final-grid{grid-template-columns:1fr}
}
</style></head>
<body>
<main class="test-page">
  <section class="test-wrap">
    <div class="test-top"><h1 class="test-title" id="main-title">Percepción y Estimación Temporal</h1><div class="progress-text" id="progress-text">Preparación</div></div>
    <div class="progressbar"><span id="progressbar"></span></div>
    <div class="test-card" id="test-card"></div>
  </section>
</main>
<script>
const TEST_PLAN = [
  {
    block:"Estimación temporal", item:1, kind:"marks", title:"Ítem 1: estimación de intervalos",
    instruction:"Presione iniciar. Luego marque cuando crea que han pasado 5, 10 y 20 segundos.",
    targets:[5,10,20],
    trials:[
      {trial:1, condition:"silencio", audio:"audios/estimacion_item1/EST_Item1_Trial1_silencio.wav"},
      {trial:2, condition:"pulso constante", audio:"audios/estimacion_item1/EST_Item1_Trial2_pulso_constante.wav"},
      {trial:3, condition:"acelerando", audio:"audios/estimacion_item1/EST_Item1_Trial3_acelerando.wav"},
      {trial:4, condition:"desacelerando", audio:"audios/estimacion_item1/EST_Item1_Trial4_desacelerando.wav"}
    ]
  },
  {
    block:"Estimación temporal", item:2, kind:"ball", title:"Ítem 2: llegada imaginada a la T",
    instruction:"Observe la pelota roja. Cuando desaparezca, continúe mentalmente su movimiento y marque cuando crea que llegó a la T.",
    trials:[
      {trial:1, condition:"silencio", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial1_silencio.wav", duration:10.50, disappear:4.25},
      {trial:2, condition:"pulso constante", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial2_pulso_constante.wav", duration:9.00, disappear:6.50},
      {trial:3, condition:"acelerando", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial3_acelerando.wav", duration:6.00, disappear:1.00},
      {trial:4, condition:"desacelerando", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial4_desacelerando.wav", duration:12.00, disappear:8.00},
      {trial:5, condition:"pulso irregular", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial5_pulso_irregular.wav", duration:8.75, disappear:3.38},
      {trial:6, condition:"pulso constante largo", audio:"audios/estimacion_item2_bola/EST_Item2_Bola_Trial6_pulso_constante_largo.wav", duration:12.00, disappear:8.00}
    ]
  },
  {
    block:"Estimación temporal", item:3, kind:"duration", title:"Ítem 3: duración del estímulo auditivo",
    instruction:"Escuche el estímulo completo. Al terminar, indique cuántos segundos cree que duró.",
    trials:[
      {trial:1, condition:"silencio", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial1_silencio.wav", duration:7.50},
      {trial:2, condition:"pulso constante", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial2_pulso_constante.wav", duration:10.00},
      {trial:3, condition:"acelerando", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial3_acelerando.wav", duration:12.50},
      {trial:4, condition:"desacelerando", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial4_desacelerando.wav", duration:9.00},
      {trial:5, condition:"pulso irregular", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial5_pulso_irregular.wav", duration:14.00},
      {trial:6, condition:"pulso constante corto", audio:"audios/estimacion_item3_duracion_auditiva/EST_Item3_DuracionAuditiva_Trial6_pulso_constante_corto.wav", duration:6.50}
    ]
  },
  {
    block:"Percepción temporal", item:1, kind:"duration", title:"Ítem 4: intervalo entre dos bips",
    instruction:"Escuche el estímulo completo. Al terminar, indique cuántos segundos cree que pasaron entre el primer y el segundo bip.",
    responseLabel:"Segundos entre bips",
    trials:[
      {trial:1, condition:"silencio", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial1_silencio.wav", duration:5.00},
      {trial:2, condition:"pulso constante", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial2_pulso_constante.wav", duration:8.00},
      {trial:3, condition:"acelerando", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial3_acelerando.wav", duration:11.00},
      {trial:4, condition:"desacelerando", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial4_desacelerando.wav", duration:13.00},
      {trial:5, condition:"pulso irregular", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial5_pulso_irregular.wav", duration:16.50},
      {trial:6, condition:"pulso constante medio", audio:"audios/percepcion_item1_dos_bips/PER_Item1_DosBips_Trial6_pulso_constante_medio.wav", duration:9.30}
    ]
  },
  {
    block:"Percepción temporal", item:2, kind:"compare", title:"Ítem 5: comparación de duraciones",
    instruction:"Escuche los estímulos A y B. Al terminar, indique cuál cree que duró más.",
    trials:[
      {trial:1, condition:"B mayor", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial1_facil_B_mayor.wav", durA:8.00, durB:10.00, correct:"B"},
      {trial:2, condition:"A mayor", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial2_facil_A_mayor.wav", durA:12.00, durB:9.00, correct:"A"},
      {trial:3, condition:"igual", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial3_igual.wav", durA:7.00, durB:7.00, correct:"Igual"},
      {trial:4, condition:"A mayor", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial4_medio_A_mayor.wav", durA:14.00, durB:11.00, correct:"A"},
      {trial:5, condition:"B mayor", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial5_medio_B_mayor.wav", durA:6.00, durB:8.50, correct:"B"},
      {trial:6, condition:"A mayor difícil", audio:"audios/percepcion_item2_comparacion_AB/PER_Item2_ComparacionAB_Trial6_dificil_A_mayor.wav", durA:10.50, durB:10.00, correct:"A"}
    ]
  },
  {block:"Percepción temporal", item:3, kind:"global", title:"Ítem 6: duración total del test", instruction:"Indique cuánto cree que duró el test desde que comenzó esta sección."}
];

let flat = [];
TEST_PLAN.forEach(section => {
  if (section.trials) section.trials.forEach(trial => flat.push({section, trial}));
  else flat.push({section, trial:null});
});
let index = -1;
let currentAudio = null;
let trialStart = 0;
let testStart = 0;
let results = [];
const card = document.getElementById("test-card");
const bar = document.getElementById("progressbar");
const progressText = document.getElementById("progress-text");

document.addEventListener("DOMContentLoaded", () => {
  renderIntro();
});

function renderIntro(){
  card.innerHTML = `<h2>Antes de comenzar</h2>
  <p class="instruction">Busque un lugar tranquilo. Use audífonos si lo desea. Durante la prueba, evite distraerse con el teléfono u otros estímulos visuales, táctiles o auditivos.</p>
  <div class="big-action"><button class="btn primary" onclick="startTest()">Comenzar test</button></div>`;
}

function startTest(){
  testStart = performance.now();
  index = 0;
  renderStep();
}

function updateProgress(){
  const pct = Math.max(0, Math.min(100, (index / flat.length) * 100));
  bar.style.width = pct + "%";
  progressText.textContent = `Ítem ${Math.min(index+1, flat.length)} de ${flat.length}`;
}

function renderStep(){
  stopAudio();
  if (index >= flat.length) return renderFinal();
  updateProgress();
  const {section, trial} = flat[index];
  const meta = trial ? `<div class="trial-meta">${section.block} · ${section.title} · Trial ${trial.trial} · ${trial.condition || ""}</div>` : `<div class="trial-meta">${section.block} · ${section.title}</div>`;
  if (section.kind === "marks") return renderMarks(section, trial, meta);
  if (section.kind === "ball") return renderBall(section, trial, meta);
  if (section.kind === "duration") return renderDuration(section, trial, meta);
  if (section.kind === "compare") return renderCompare(section, trial, meta);
  if (section.kind === "global") return renderGlobal(section, meta);
}

function makeAudio(src){
  const audio = new Audio(src);
  audio.preload = "auto";
  currentAudio = audio;
  return audio;
}

function stopAudio(){
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function next(){
  index += 1;
  renderStep();
}

function renderMarks(section, trial, meta){
  let marks = [];
  let targetIndex = 0;
  card.innerHTML = `${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p>
  <div class="big-action"><button id="mark-btn" class="round-btn">Iniciar</button></div>
  <p class="muted" id="hint">Primero presione iniciar. Luego marque 5, 10 y 20 segundos.</p>`;
  const btn = document.getElementById("mark-btn");
  btn.onclick = async () => {
    if (targetIndex === 0 && marks.length === 0) {
      trialStart = performance.now();
      const audio = makeAudio(trial.audio);
      try { await audio.play(); } catch(e) { alert("No se pudo reproducir el audio. Revise el volumen o permisos del navegador."); }
      marks.push({label:"inicio", elapsed:0});
      btn.textContent = "5 s";
      document.getElementById("hint").textContent = "Marque cuando crea que pasaron 5 segundos.";
      return;
    }
    const elapsed = (performance.now() - trialStart)/1000;
    const target = section.targets[targetIndex];
    marks.push({label:`${target}s`, target, elapsed, error: target - elapsed});
    targetIndex += 1;
    if (targetIndex < section.targets.length) {
      btn.textContent = section.targets[targetIndex] + " s";
      document.getElementById("hint").textContent = `Marque cuando crea que pasaron ${section.targets[targetIndex]} segundos.`;
    } else {
      stopAudio();
      btn.disabled = true;
      document.getElementById("hint").textContent = "Respuesta registrada.";
      results.push({kind:"marks", block:section.block, item:section.item, trial:trial.trial, condition:trial.condition, marks});
      setTimeout(next, 700);
    }
  };
}

function renderBall(section, trial, meta){
  card.innerHTML = `${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p>
  <div class="arrival-area"><div class="track"></div><div class="ball" id="ball"></div><div class="targetT">T</div></div>
  <div class="big-action"><button id="start-ball" class="btn primary">Iniciar trial</button><button id="arrive-btn" class="btn secondary" disabled>Marcar llegada</button></div>
  <p class="muted" id="ball-hint">Presione iniciar para comenzar.</p>`;
  const startBtn = document.getElementById("start-ball");
  const arriveBtn = document.getElementById("arrive-btn");
  const ball = document.getElementById("ball");
  let raf = null;
  let hidden = false;

  startBtn.onclick = async () => {
    startBtn.disabled = true;
    arriveBtn.disabled = false;
    trialStart = performance.now();
    const audio = makeAudio(trial.audio);
    try { await audio.play(); } catch(e) { alert("No se pudo reproducir el audio."); }
    document.getElementById("ball-hint").textContent = "Observe la pelota. Cuando desaparezca, marque cuando crea que llegó a la T.";
    const animate = () => {
      const elapsed = (performance.now() - trialStart)/1000;
      const pct = Math.min(1, elapsed / trial.duration);
      if (!hidden) ball.style.left = `calc(9% + ${pct} * 76%)`;
      if (!hidden && elapsed >= trial.disappear) {
        hidden = true;
        ball.style.display = "none";
      }
      if (elapsed < trial.duration && !arriveBtn.disabled) raf = requestAnimationFrame(animate);
    };
    raf = requestAnimationFrame(animate);
  };
  arriveBtn.onclick = () => {
    const response = (performance.now() - trialStart)/1000;
    stopAudio();
    if (raf) cancelAnimationFrame(raf);
    arriveBtn.disabled = true;
    results.push({kind:"ball", block:section.block, item:section.item, trial:trial.trial, condition:trial.condition, duration:trial.duration, disappear:trial.disappear, response, error:trial.duration-response, post_disappear: response-trial.disappear});
    document.getElementById("ball-hint").textContent = "Respuesta registrada.";
    setTimeout(next, 700);
  };
}

function renderDuration(section, trial, meta){
  card.innerHTML = `${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p>
  <div class="big-action"><button id="play-btn" class="btn primary">Reproducir estímulo</button></div>
  <div id="response-panel" class="response-panel"><label>${section.responseLabel || "Duración estimada en segundos"}: <input type="number" id="num-response" min="0" step="0.1"></label><button class="btn primary" id="save-response">Guardar</button></div>
  <p class="muted" id="dur-hint">Presione reproducir y espere a que termine el estímulo.</p>`;
  const play = document.getElementById("play-btn");
  const panel = document.getElementById("response-panel");
  play.onclick = async () => {
    play.disabled = true;
    const audio = makeAudio(trial.audio);
    audio.onended = () => {
      panel.classList.add("show");
      document.getElementById("dur-hint").textContent = "Ingrese su respuesta.";
    };
    try { await audio.play(); } catch(e) { alert("No se pudo reproducir el audio."); play.disabled=false; }
  };
  document.getElementById("save-response").onclick = () => {
    const val = parseFloat(document.getElementById("num-response").value);
    if (Number.isNaN(val)) { alert("Ingrese una respuesta numérica."); return; }
    results.push({kind:"duration", block:section.block, item:section.item, trial:trial.trial, condition:trial.condition, target:trial.duration, response:val, error:trial.duration-val});
    next();
  };
}

function renderCompare(section, trial, meta){
  card.innerHTML = `${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p>
  <div class="big-action"><button id="play-btn" class="btn primary">Reproducir A y B</button></div>
  <div id="response-panel" class="response-panel"><div class="option-row"><button class="btn secondary" data-resp="A">A duró más</button><button class="btn secondary" data-resp="B">B duró más</button><button class="btn secondary" data-resp="Igual">Duraron igual</button></div></div>
  <p class="muted" id="cmp-hint">Presione reproducir y espere a que termine.</p>`;
  const play = document.getElementById("play-btn");
  const panel = document.getElementById("response-panel");
  play.onclick = async () => {
    play.disabled = true;
    const audio = makeAudio(trial.audio);
    audio.onended = () => {
      panel.classList.add("show");
      document.getElementById("cmp-hint").textContent = "Seleccione su respuesta.";
    };
    try { await audio.play(); } catch(e) { alert("No se pudo reproducir el audio."); play.disabled=false; }
  };
  panel.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      const response = btn.dataset.resp;
      results.push({kind:"compare", block:section.block, item:section.item, trial:trial.trial, condition:trial.condition, durA:trial.durA, durB:trial.durB, response, correct:trial.correct, score: response === trial.correct ? 1 : 0});
      next();
    };
  });
}

function renderGlobal(section, meta){
  const elapsed = (performance.now() - testStart)/1000;
  card.innerHTML = `${meta}<h2>${section.title}</h2><p class="instruction">${section.instruction}</p>
  <div class="response-panel show"><label>Minutos: <input type="number" id="min-response" min="0" step="1"></label><label>Segundos: <input type="number" id="sec-response" min="0" max="59" step="1"></label><button class="btn primary" id="save-global">Guardar</button></div>`;
  document.getElementById("save-global").onclick = () => {
    const m = parseFloat(document.getElementById("min-response").value || "0");
    const s = parseFloat(document.getElementById("sec-response").value || "0");
    if (Number.isNaN(m) || Number.isNaN(s)) { alert("Ingrese minutos y segundos."); return; }
    const response = m*60 + s;
    results.push({kind:"global", block:section.block, item:section.item, real:elapsed, response, error:elapsed-response});
    index += 1;
    renderFinal();
  };
}

function renderFinal(){
  stopAudio();
  const total = (performance.now() - testStart)/1000;
  const numericErrors = results.flatMap(r => {
    if (r.kind==="marks") return r.marks.filter(m=>m.target).map(m=>Math.abs(m.error));
    if (["ball","duration","global"].includes(r.kind)) return [Math.abs(r.error)];
    return [];
  });
  const avgAbs = numericErrors.length ? numericErrors.reduce((a,b)=>a+b,0)/numericErrors.length : 0;
  const compare = results.filter(r=>r.kind==="compare");
  const compScore = compare.length ? compare.reduce((a,b)=>a+b.score,0)/compare.length : 0;
  card.innerHTML = `<h2>Gracias por participar</h2><p class="instruction">Sus respuestas han sido registradas en este navegador. Puede descargar un resumen para revisión.</p>
  <div class="final-grid"><div class="metric">Error absoluto promedio<strong>${avgAbs.toFixed(2)} s</strong></div><div class="metric">Comparaciones correctas<strong>${Math.round(compScore*100)}%</strong></div><div class="metric">Duración del test<strong>${formatTime(total)}</strong></div><div class="metric">Mediciones registradas<strong>${results.length}</strong></div></div>
  <div class="downloads"><button class="btn primary" onclick="downloadCSV()">Descargar CSV</button><button class="btn secondary" onclick="downloadJSON()">Descargar JSON</button></div>`;
  bar.style.width = "100%";
  progressText.textContent = "Finalizado";
  localStorage.setItem("resultados_percepcion_temporal", JSON.stringify({demographics:getDemo(), results, total}));
}

function getDemo(){
  try { return JSON.parse(localStorage.getItem("demograficos_percepcion_temporal") || "{}"); } catch(e) { return {}; }
}

function buildRow(){
  const d = getDemo();
  const row = {N:1, Edad:d.edad||d.Edad||"", Sexo:d.sexo||"", Pais:d.pais||"", Estudios:d.estudios||"", SegundoIdioma:d.segundo_idioma||"", Hablar:d.hablar||0, Escuchar:d.escuchar||0, Leer:d.leer||0, Escribir:d.escribir||0, Ent_sinMirar:d.ent_sin_mirar||"", hrsMus:d.hrs_mus||"", ConAnio:d.con_anio||"", AutoDef:d.autodef||""};
  results.forEach(r => {
    if (r.kind==="marks") r.marks.filter(m=>m.target).forEach(m=>{row[`EST_Item${r.item}_Trial${r.trial}_${m.target}s_respuesta`]=round(m.elapsed);row[`EST_Item${r.item}_Trial${r.trial}_${m.target}s_error`]=round(m.error);});
    if (r.kind==="ball") {row[`EST_Item${r.item}_Trial${r.trial}_objetivo_audio`]=r.duration;row[`EST_Item${r.item}_Trial${r.trial}_bola_desaparece`]=r.disappear;row[`EST_Item${r.item}_Trial${r.trial}_respuesta_T`]=round(r.response);row[`EST_Item${r.item}_Trial${r.trial}_error_T`]=round(r.error);row[`EST_Item${r.item}_Trial${r.trial}_post_desaparicion`]=round(r.post_disappear);}
    if (r.kind==="duration") {const prefix = r.block.includes("Estimación") ? "EST" : "PER"; row[`${prefix}_Item${r.item}_Trial${r.trial}_duracion_real`]=r.target;row[`${prefix}_Item${r.item}_Trial${r.trial}_respuesta`]=round(r.response);row[`${prefix}_Item${r.item}_Trial${r.trial}_error`]=round(r.error);}
    if (r.kind==="compare") {row[`PER_Item${r.item}_Trial${r.trial}_duracion_A`]=r.durA;row[`PER_Item${r.item}_Trial${r.trial}_duracion_B`]=r.durB;row[`PER_Item${r.item}_Trial${r.trial}_respuesta`]=r.response;row[`PER_Item${r.item}_Trial${r.trial}_correcta`]=r.correct;row[`PER_Item${r.item}_Trial${r.trial}_puntaje`]=r.score;}
    if (r.kind==="global") {row[`PER_Item${r.item}_duracion_real_global_segundos`]=round(r.real);row[`PER_Item${r.item}_estimacion_global_segundos`]=round(r.response);row[`PER_Item${r.item}_error_global`]=round(r.error);}
  });
  return row;
}

function downloadCSV(){
  const row = buildRow();
  const keys = Object.keys(row);
  const csv = keys.join(",") + "\n" + keys.map(k => csvCell(row[k])).join(",");
  download("matriz_participante.csv", csv, "text/csv;charset=utf-8");
}
function downloadJSON(){download("resultados_participante.json", JSON.stringify({demographics:getDemo(), results}, null, 2), "application/json");}
function download(filename, content, type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
function csvCell(v){const s=String(v ?? "");return /[",\n]/.test(s) ? '"' + s.replaceAll('"','""') + '"' : s;}
function round(n){return Math.round(n*1000)/1000;}
function formatTime(sec){const m=Math.floor(sec/60), s=Math.round(sec%60);return `${m}:${String(s).padStart(2,"0")}`;}
</script>
</body></html>
